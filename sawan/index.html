 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Visualizer Engine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #voice-controls {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      text-align: center;
      width: 100%;
    }

    #voice-btn {
      background: transparent;
      color: #00ffcc;
      border: 2px solid rgba(0, 255, 204, 0.4);
      padding: 14px 32px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.1);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(8px);
    }

    #voice-btn:hover {
      background: rgba(0, 255, 204, 0.05);
      border-color: #00ffcc;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
      transform: scale(1.05);
    }

    #voice-btn.listening {
      color: #ff2a74;
      border-color: #ff2a74;
      box-shadow: 0 0 30px rgba(255, 42, 116, 0.4);
      animation: pulseGlow 1.5s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.03); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="visualizer"></canvas>
<audio id="audio-engine" crossorigin="anonymous" loop></audio>

<div id="voice-controls">
  <button id="voice-btn">Tap to Search</button>
</div>

<script>
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
const audioEl = document.getElementById("audio-engine");
const voiceBtn = document.getElementById("voice-btn");

let w, h;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  w = window.innerWidth;
  h = window.innerHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
}
window.addEventListener("resize", resize);
resize();

let lSmoothZoom = 80;
let lDynamicHue = 180; 
let globalMutationTracker = 0; 
let playing = false;

const amoledParticles = [];
const maxParticles = 65;

function initAmoledParticles() {
  for (let i = 0; i < maxParticles; i++) {
    amoledParticles.push({
      angle: Math.random() * Math.PI * 2,
      distanceRatio: 0.3 + Math.random() * 0.7,
      size: 0.8 + Math.random() * 1.6,
      speed: 0.001 + Math.random() * 0.004,
      seed: Math.random() * 100
    });
  }
}
initAmoledParticles();

const bgImage = new Image();
bgImage.src = "https://i.imgur.com/8Q5N8bB.png"; 

const AudioContext = window.AudioContext || window.webkitAudioContext;
let actx, analyser, sourceNode, frequencyData, frequencyDataLen;

function initAudioContext() {
  if (!actx && AudioContext) {
    actx = new AudioContext();
    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.65;
    
    sourceNode = actx.createMediaElementSource(audioEl);
    sourceNode.connect(analyser);
    analyser.connect(actx.destination);
    
    frequencyDataLen = analyser.frequencyBinCount;
    frequencyData = new Uint8Array(frequencyDataLen);
  }
  if (actx && actx.state === 'suspended') {
    actx.resume();
  }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;

  voiceBtn.addEventListener('click', () => {
    initAudioContext();
    if (playing) pause();
    recognition.start();
    voiceBtn.classList.add("listening");
    voiceBtn.textContent = "Listening...";
  });

  recognition.onresult = function(event) {
    const query = event.results[0][0].transcript;
    voiceBtn.textContent = "Processing...";
    fetchSong(query);
  };

  recognition.onerror = recognition.onend = function() {
    voiceBtn.classList.remove("listening");
    if (!playing) voiceBtn.textContent = "Tap to Search";
  };
}

function fetchSong(query) {
  fetch(`https://svn-vivekfy.vercel.app/search/songs?query=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(json => {
      const results = json?.data?.results || [];
      if (results.length > 0) {
        const song = results[0];
        if (song.image && song.image.length > 0) {
          bgImage.src = song.image[song.image.length - 1].link || song.image[song.image.length - 1].url;
        }
        const downloadUrls = song.downloadUrl;
        if (downloadUrls && downloadUrls.length > 0) {
          audioEl.src = downloadUrls[downloadUrls.length - 1].link;
          play();
        }
      } else {
        voiceBtn.textContent = "No Song Found";
      }
    })
    .catch(() => {
      voiceBtn.textContent = "Network Error";
    });
}

canvas.addEventListener("click", () => {
  if (!audioEl.src) return;
  initAudioContext();
  playing ? pause() : play();
});

function play() {
  initAudioContext();
  audioEl.play().then(() => {
    if (!playing) {
      playing = true;
      voiceBtn.textContent = "Playing Engine";
      render();
    }
  }).catch(() => {
    voiceBtn.textContent = "Tap to Bypass Safe-Lock";
  });
}

function pause() {
  audioEl.pause();
  playing = false;
  voiceBtn.textContent = "Paused";
}

function getBassPulse() {
  if (!frequencyData) return 0;
  let bassSum = 0;
  const totalBins = 6; 
  for (let i = 0; i < totalBins; i++) {
    bassSum += frequencyData[i];
  }
  return bassSum / totalBins;
}

function render() {
  if (!playing) return;
  
  if (analyser && frequencyData) {
    analyser.getByteFrequencyData(frequencyData);
  }

  const cx = w / 2;
  const cy = h / 2;

  if (audioEl.readyState < 3) {
    requestAnimationFrame(render);
    return; 
  }

  globalMutationTracker += 0.025; 
  let realAudioBass = getBassPulse(); 
  let bassPulse = (realAudioBass * 0.38) + Math.sin(globalMutationTracker * 1.8) * 4;

  if (Math.floor(globalMutationTracker * 0.15) % 2 === 0) {
    lDynamicHue = (180 + Math.sin(globalMutationTracker * 0.08) * 25) % 360; 
  } else {
    lDynamicHue = (355 + Math.sin(globalMutationTracker * 0.08) * 15) % 360; 
  }

  let minR = 80;
  let targetZoom = minR + (bassPulse * 0.45);
  lSmoothZoom += (targetZoom - lSmoothZoom) * 0.22;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "#000000";
  ctx.fillRect(0, 0, w, h);

  if (bgImage.complete) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, lSmoothZoom, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(bgImage, cx - lSmoothZoom, cy - lSmoothZoom, lSmoothZoom * 2, lSmoothZoom * 2);
    ctx.restore();
  }

  ctx.save();
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, lSmoothZoom + 2, 0, Math.PI * 2);
  ctx.strokeStyle = `hsla(${lDynamicHue}, 100%, 50%, 0.85)`;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, lSmoothZoom + 25 + Math.sin(globalMutationTracker) * 8, 0, Math.PI * 2);
  ctx.setLineDash([4, 12]);
  ctx.strokeStyle = `hsla(${lDynamicHue - 30}, 100%, 45%, 0.35)`;
  ctx.stroke();
  ctx.restore();

  ctx.save();
  const maxReach = Math.min(w, h) * 0.46;
  
  amoledParticles.forEach((p) => {
    p.angle += p.speed * (1 + bassPulse * 0.05);
    let pulseDist = lSmoothZoom + 5 + (maxReach * p.distanceRatio) + Math.sin(globalMutationTracker + p.seed) * 15;
    
    let px = cx + Math.cos(p.angle) * pulseDist;
    let py = cy + Math.sin(p.angle) * pulseDist;
    let alpha = (1 - (p.distanceRatio)) * 0.6;
    
    ctx.fillStyle = `hsla(${lDynamicHue + (p.angle * 10)}, 100%, 65%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, p.size * (1 + bassPulse * 0.02), 0, Math.PI * 2);
    ctx.fill();

    amoledParticles.forEach((p2) => {
      let p2Dist = lSmoothZoom + 5 + (maxReach * p2.distanceRatio) + Math.sin(globalMutationTracker + p2.seed) * 15;
      let p2x = cx + Math.cos(p2.angle) * p2Dist;
      let p2y = cy + Math.sin(p2.angle) * p2Dist;
      let distance = Math.hypot(px - p2x, py - p2y);
      
      if(distance < 55) {
        ctx.strokeStyle = `hsla(${lDynamicHue}, 100%, 50%, ${(1 - distance/55) * 0.1})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(p2x, p2y);
        ctx.stroke();
      }
    });
  });
  ctx.restore();

  const totalRays = 90; 
  ctx.save();
  for (let i = 0; i < totalRays; i++) {
    let angle = (i / totalRays) * Math.PI * 2 + (globalMutationTracker * 0.04);
    let frequencyIntensity = frequencyData ? frequencyData[i % frequencyDataLen] * 0.28 : 0;
    let waveSpike = Math.sin(i * 0.25 + globalMutationTracker * 3.5) * 12 +
                    Math.cos(i * 0.12 - globalMutationTracker * 1.5) * 8;
                    
    let rayLength = Math.max(0, (waveSpike * 0.5) + (bassPulse * 0.3) + frequencyIntensity);
    
    let cos = Math.cos(angle);
    let sin = Math.sin(angle);

    let startX = cx + (lSmoothZoom + 4) * cos;
    let startY = cy + (lSmoothZoom + 4) * sin;
    let endX = cx + (lSmoothZoom + 4 + rayLength) * cos;
    let endY = cy + (lSmoothZoom + 4 + rayLength) * sin;

    let rayGrd = ctx.createLinearGradient(startX, startY, endX, endY);
    rayGrd.addColorStop(0, `hsla(${lDynamicHue}, 100%, 55%, 0.75)`);
    rayGrd.addColorStop(0.5, `hsla(${lDynamicHue + 30}, 100%, 50%, 0.15)`);
    rayGrd.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.lineWidth = 1.2; 
    ctx.strokeStyle = rayGrd;
    ctx.stroke();
  }
  ctx.restore();

  requestAnimationFrame(render);
}
</script>
</body>
</html>
